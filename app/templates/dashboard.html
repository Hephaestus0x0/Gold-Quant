<!DOCTYPE html>
<html>
<head>
    <title>Gold Quant Dashboard</title>
    <style>
        body { font-family: Arial; margin: 40px; background: #0a0e27; color: #fff; }
        h1 { color: #4fc3f7; }
        .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin: 30px 0; }
        .metric { background: #1a1f3a; padding: 20px; border-radius: 8px; border: 1px solid #2a3f5f; }
        .metric-value { font-size: 32px; font-weight: bold; color: #4fc3f7; }
        .metric-label { color: #8892b0; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin: 30px 0; background: #1a1f3a; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #2a3f5f; }
        th { color: #4fc3f7; }
        .status-ok { color: #00ff00; }
        .status-error { color: #ff0000; }
    </style>
</head>
<body>
    <h1>🏆 Gold Quant Dashboard</h1>
    
    <div class="metrics">
        <div class="metric">
            <div class="metric-value" id="active-signals">--</div>
            <div class="metric-label">Active Signals</div>
        </div>
        <div class="metric">
            <div class="metric-value" id="win-rate">--%</div>
            <div class="metric-label">Win Rate</div>
        </div>
        <div class="metric">
            <div class="metric-value" id="total-pnl">-- pips</div>
            <div class="metric-label">Total P&L</div>
        </div>
        <div class="metric">
            <div class="metric-value status-ok" id="system-status">OK</div>
            <div class="metric-label">System Status</div>
        </div>
    </div>
    
    <h2>Recent Signals</h2>
    <table>
        <thead>
            <tr>
                <th>Time</th>
                <th>Direction</th>
                <th>Entry</th>
                <th>SL</th>
                <th>TP1</th>
                <th>Confidence</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="signals-table">
            <tr>
                <td colspan="7" style="text-align: center; color: #8892b0;">Loading...</td>
            </tr>
        </tbody>
    </table>
    
    <div style="margin-top: 40px; color: #8892b0;">
        <p>🤖 Powered by Twelve Data API</p>
        <p>📱 Alerts via Telegram: @GoldQuantSignalBot</p>
        <p id="last-update" style="font-size: 12px;">Last update: --</p>
    </div>
    
    <script>
        async function updateDashboard() {
            try {
                const response = await fetch('/dashboard/data');
                const data = await response.json();
                
                document.getElementById('active-signals').textContent = data.active_signals;
                document.getElementById('win-rate').textContent = data.win_rate + '%';
                document.getElementById('total-pnl').textContent = data.total_pnl_pips + ' pips';
                
                const statusEl = document.getElementById('system-status');
                statusEl.textContent = data.scheduler === 'running' ? 'ONLINE' : 'OFFLINE';
                statusEl.className = data.scheduler === 'running' ? 'status-ok' : 'status-error';
                
                const tableBody = document.getElementById('signals-table');
                if (data.recent_signals.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #8892b0;">No signals yet</td></tr>';
                } else {
                    tableBody.innerHTML = data.recent_signals.map(signal => {
                        const time = new Date(signal.created_at).toLocaleTimeString();
                        const dirColor = signal.direction === 'long' ? '#26a69a' : '#ef5350';
                        return `
                            <tr>
                                <td>${time}</td>
                                <td style="color: ${dirColor}; font-weight: bold;">${signal.direction.toUpperCase()}</td>
                                <td>${signal.entry_price.toFixed(2)}</td>
                                <td>${signal.stop_loss ? signal.stop_loss.toFixed(2) : '--'}</td>
                                <td>${signal.take_profit_1 ? signal.take_profit_1.toFixed(2) : '--'}</td>
                                <td>${(signal.confidence * 100).toFixed(0)}%</td>
                                <td>${signal.status}</td>
                            </tr>
                        `;
                    }).join('');
                }
                
                document.getElementById('last-update').textContent = 'Last update: ' + new Date().toLocaleTimeString();
                
            } catch (error) {
                console.error('Error fetching dashboard data:', error);
                document.getElementById('system-status').textContent = 'ERROR';
                document.getElementById('system-status').className = 'status-error';
            }
        }
        
        updateDashboard();
        setInterval(updateDashboard, 10000);
    </script>
</body>
</html>
